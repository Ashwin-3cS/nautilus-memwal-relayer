name: Deploy Enclave

on:
  push:
    branches: [main]

concurrency:
  group: deploy-enclave
  cancel-in-progress: true

env:
  APP_DIR: nautilus-app
  ENCLAVE_CPU: 2
  ENCLAVE_MEM: 4096   # Node + tsx + @mysten/* needs more headroom than pure Rust

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Copy source to EC2 ────────────────────────────────────────────────
      - name: Copy source to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.TEE_EC2_HOST }}
          username: ${{ secrets.TEE_EC2_USER }}
          key: ${{ secrets.TEE_EC2_SSH_KEY }}
          source: "Containerfile,src,Cargo.toml,Makefile,.gitignore"
          target: "~/nautilus-app/"
          overwrite: true
          rm: false

      # ── Write env file to EC2 ─────────────────────────────────────────────
      # MEMWAL_ENV_FILE is a single GitHub secret containing the full contents
      # of .env.memwal. Store it in Settings → Secrets → MEMWAL_ENV_FILE.
      - name: Write env file to EC2
        env:
          EC2_HOST: ${{ secrets.TEE_EC2_HOST }}
          EC2_USER: ${{ secrets.TEE_EC2_USER }}
          EC2_KEY: ${{ secrets.TEE_EC2_SSH_KEY }}
          MEMWAL_ENV_FILE: ${{ secrets.MEMWAL_ENV_FILE }}
        run: |
          echo "$EC2_KEY" > /tmp/deploy_key && chmod 600 /tmp/deploy_key
          printf '%s' "$MEMWAL_ENV_FILE" | \
            ssh -o StrictHostKeyChecking=no \
                -o ServerAliveInterval=30 \
                -i /tmp/deploy_key \
                "$EC2_USER@$EC2_HOST" \
                "cat > ~/.env.runtime && chmod 600 ~/.env.runtime"
          rm -f /tmp/deploy_key

      # ── Install deps ──────────────────────────────────────────────────────
      - name: Install dependencies
        env:
          EC2_HOST: ${{ secrets.TEE_EC2_HOST }}
          EC2_USER: ${{ secrets.TEE_EC2_USER }}
          EC2_KEY: ${{ secrets.TEE_EC2_SSH_KEY }}
        run: |
          echo "$EC2_KEY" > /tmp/deploy_key && chmod 600 /tmp/deploy_key
          SSH="ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -i /tmp/deploy_key $EC2_USER@$EC2_HOST"
          $SSH 'bash -s' << 'REMOTE'
          set -e
          if command -v dnf &> /dev/null; then PKG="sudo dnf"; else PKG="sudo yum"; fi
          if ! command -v docker &> /dev/null; then
            $PKG install -y docker || (curl -fsSL https://get.docker.com | sudo sh)
            sudo systemctl start docker && sudo systemctl enable docker
            sudo usermod -aG docker $USER
          fi
          if ! command -v nitro-cli &> /dev/null; then
            $PKG install -y aws-nitro-enclaves-cli aws-nitro-enclaves-cli-devel
            sudo usermod -aG ne $USER
          fi
          command -v socat &> /dev/null || $PKG install -y socat
          command -v jq    &> /dev/null || $PKG install -y jq
          echo "Dependencies ready"
          REMOTE
          rm -f /tmp/deploy_key

      # ── Build EIF on EC2 ──────────────────────────────────────────────────
      - name: Build enclave image
        env:
          EC2_HOST: ${{ secrets.TEE_EC2_HOST }}
          EC2_USER: ${{ secrets.TEE_EC2_USER }}
          EC2_KEY: ${{ secrets.TEE_EC2_SSH_KEY }}
        run: |
          echo "$EC2_KEY" > /tmp/deploy_key && chmod 600 /tmp/deploy_key
          SSH="ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -i /tmp/deploy_key $EC2_USER@$EC2_HOST"
          $SSH 'bash -s' << 'REMOTE'
          set -e
          cd ~/nautilus-app && rm -rf out && mkdir -p out
          sudo docker build \
            --platform linux/amd64 \
            --progress=plain \
            --output type=local,dest=out/ \
            -f Containerfile . 2>&1 | tee out/docker.log
          echo "--- PCR Measurements ---"
          cat out/nitro.pcrs
          REMOTE
          rm -f /tmp/deploy_key

      # ── Tear down old enclave ─────────────────────────────────────────────
      - name: Terminate old enclave
        env:
          EC2_HOST: ${{ secrets.TEE_EC2_HOST }}
          EC2_USER: ${{ secrets.TEE_EC2_USER }}
          EC2_KEY: ${{ secrets.TEE_EC2_SSH_KEY }}
        run: |
          echo "$EC2_KEY" > /tmp/deploy_key && chmod 600 /tmp/deploy_key
          SSH="ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -i /tmp/deploy_key $EC2_USER@$EC2_HOST"
          $SSH 'bash -s' << 'REMOTE'
          # Stop all host-side bridge/proxy services
          for svc in \
            nautilus-bridge nautilus-logs nautilus-sidecar-logs \
            nautilus-outbound-sui \
            nautilus-outbound-walrus-publisher \
            nautilus-outbound-walrus-aggregator \
            nautilus-outbound-postgres \
            nautilus-outbound-redis \
            nautilus-outbound-openai \
            nautilus-outbound-embedding \
            "nautilus-outbound-seal-*"; do
            sudo systemctl stop "$svc.service" 2>/dev/null || true
          done
          sudo nitro-cli terminate-enclave --all || true
          # Give the kernel a moment to release CPUs before touching the allocator
          sleep 5
          # Update allocator config
          ALLOC=/etc/nitro_enclaves/allocator.yaml
          sudo sed -i "s/memory_mib:.*/memory_mib: 4096/" "$ALLOC"
          sudo sed -i "s/cpu_count:.*/cpu_count: 2/"    "$ALLOC"
          sudo systemctl enable nitro-enclaves-allocator.service || true
          # Clear any prior failed state so systemd rate limiting doesn't block us,
          # then start (not restart — service is already stopped/failed)
          sudo systemctl reset-failed nitro-enclaves-allocator.service || true
          sudo systemctl start nitro-enclaves-allocator.service
          sudo systemctl is-active nitro-enclaves-allocator.service
          REMOTE
          rm -f /tmp/deploy_key

      # ── Launch new enclave ────────────────────────────────────────────────
      - name: Launch enclave
        env:
          EC2_HOST: ${{ secrets.TEE_EC2_HOST }}
          EC2_USER: ${{ secrets.TEE_EC2_USER }}
          EC2_KEY: ${{ secrets.TEE_EC2_SSH_KEY }}
        run: |
          echo "$EC2_KEY" > /tmp/deploy_key && chmod 600 /tmp/deploy_key
          SSH="ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -i /tmp/deploy_key $EC2_USER@$EC2_HOST"
          $SSH 'bash -s' << 'REMOTE'
          set -e
          sudo nitro-cli run-enclave \
            --cpu-count 2 \
            --memory 4096 \
            --eif-path ~/nautilus-app/out/nitro.eif
          sudo nitro-cli describe-enclaves | jq -r '.[0] | "CID: \(.EnclaveCID)  State: \(.State)"'
          REMOTE
          rm -f /tmp/deploy_key

      # ── Setup host-side VSOCK bridge + outbound systemd services ─────────
      # Sources ~/.env.runtime (written in "Write env file" step) to read
      # all URL values needed to create the socat systemd units.
      - name: Setup VSOCK bridge
        env:
          EC2_HOST: ${{ secrets.TEE_EC2_HOST }}
          EC2_USER: ${{ secrets.TEE_EC2_USER }}
          EC2_KEY: ${{ secrets.TEE_EC2_SSH_KEY }}
        run: |
          echo "$EC2_KEY" > /tmp/deploy_key && chmod 600 /tmp/deploy_key
          SSH="ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -i /tmp/deploy_key $EC2_USER@$EC2_HOST"
          $SSH 'bash -s' << 'REMOTE'
          set -e

          # Load all env vars from the runtime file
          set -a
          # shellcheck source=/dev/null
          source ~/.env.runtime
          set +a

          extract_url_host() {
            printf '%s' "$1" | sed -E 's#^[a-zA-Z][a-zA-Z0-9+.-]*://(\[[^]]+\]|[^/:@]+@)?(\[[^]]+\]|[^/:]+).*#\2#'
          }
          extract_url_port() {
            url="$1"
            ep=$(printf '%s' "$url" | sed -nE 's#^[a-zA-Z][a-zA-Z0-9+.-]*://([^@]+@)?[^/:]+:([0-9]+).*$#\2#p')
            [ -n "$ep" ] && { printf '%s' "$ep"; return; }
            scheme=$(printf '%s' "$url" | sed -nE 's#^([a-zA-Z][a-zA-Z0-9+.-]*)://.*#\1#p')
            case "$scheme" in https|rediss) printf '443';; http|redis) printf '80';; *) printf '443';; esac
          }

          # Write a systemd unit file using printf to avoid heredoc column-0 issues
          write_unit() {
            dest="$1"; shift
            printf '%s\n' "$@" | sudo tee "$dest" > /dev/null
          }

          create_outbound_service() {
            svc="$1"; vsock_port="$2"; url="$3"
            h=$(extract_url_host "$url"); p=$(extract_url_port "$url")
            printf '[Unit]\nDescription=%s (VSOCK:%s -> %s:%s)\nAfter=network.target\n[Service]\nExecStart=/usr/bin/socat VSOCK-LISTEN:%s,fork,reuseaddr TCP:%s:%s\nRestart=always\nRestartSec=2\n[Install]\nWantedBy=multi-user.target\n' \
              "$svc" "$vsock_port" "$h" "$p" "$vsock_port" "$h" "$p" \
              | sudo tee "/etc/systemd/system/${svc}.service" > /dev/null
          }

          CID=$(sudo nitro-cli describe-enclaves | jq -r '.[0].EnclaveCID // empty')
          [ -z "$CID" ] && { echo "ERROR: no enclave CID"; exit 1; }

          # Inbound bridge: host TCP:4000 → enclave VSOCK:4000
          write_unit /etc/systemd/system/nautilus-bridge.service \
            '[Unit]' \
            'Description=Nautilus VSOCK bridge (TCP:4000 <-> VSOCK:4000)' \
            'After=network.target' \
            '[Service]' \
            "ExecStart=/usr/bin/socat TCP-LISTEN:4000,reuseaddr,fork VSOCK-CONNECT:${CID}:4000" \
            'Restart=always' \
            'RestartSec=2' \
            '[Install]' \
            'WantedBy=multi-user.target'

          # Log collectors (server + sidecar)
          write_unit /etc/systemd/system/nautilus-logs.service \
            '[Unit]' \
            'Description=Nautilus server log collector (VSOCK:5000)' \
            'After=network.target' \
            '[Service]' \
            'ExecStart=/usr/bin/socat VSOCK-LISTEN:5000,fork,reuseaddr OPEN:/tmp/enclave.log,creat,append' \
            'Restart=always' \
            'RestartSec=2' \
            '[Install]' \
            'WantedBy=multi-user.target'

          write_unit /etc/systemd/system/nautilus-sidecar-logs.service \
            '[Unit]' \
            'Description=Nautilus sidecar log collector (VSOCK:5001)' \
            'After=network.target' \
            '[Service]' \
            'ExecStart=/usr/bin/socat VSOCK-LISTEN:5001,fork,reuseaddr OPEN:/tmp/sidecar.log,creat,append' \
            'Restart=always' \
            'RestartSec=2' \
            '[Install]' \
            'WantedBy=multi-user.target'

          # Outbound proxies — VSOCK port numbers come from ~/.env.runtime
          create_outbound_service "nautilus-outbound-sui"               "${SUI_PROXY_VSOCK_PORT:-8101}"               "$SUI_RPC_URL"
          create_outbound_service "nautilus-outbound-walrus-publisher"  "${WALRUS_PUBLISHER_PROXY_VSOCK_PORT:-8102}"  "$WALRUS_PUBLISHER_URL"
          create_outbound_service "nautilus-outbound-walrus-aggregator" "${WALRUS_AGGREGATOR_PROXY_VSOCK_PORT:-8103}" "$WALRUS_AGGREGATOR_URL"

          # Postgres — parse host:port from DATABASE_URL
          PG_HOST=$(printf '%s' "$DATABASE_URL" | sed -nE 's#^[^:]+://[^@]+@([^:/]+).*#\1#p')
          PG_PORT=$(printf '%s' "$DATABASE_URL" | sed -nE 's#^[^:]+://[^@]+@[^:]+:([0-9]+).*#\1#p')
          PG_PORT="${PG_PORT:-5432}"
          POSTGRES_VSOCK="${POSTGRES_PROXY_VSOCK_PORT:-8104}"
          printf '[Unit]\nDescription=Nautilus outbound Postgres (VSOCK:%s -> %s:%s)\nAfter=network.target\n[Service]\nExecStart=/usr/bin/socat VSOCK-LISTEN:%s,fork,reuseaddr TCP:%s:%s\nRestart=always\nRestartSec=2\n[Install]\nWantedBy=multi-user.target\n' \
            "$POSTGRES_VSOCK" "$PG_HOST" "$PG_PORT" "$POSTGRES_VSOCK" "$PG_HOST" "$PG_PORT" \
            | sudo tee /etc/systemd/system/nautilus-outbound-postgres.service > /dev/null

          # Redis — parse host:port from REDIS_URL (handles rediss:// with credentials)
          REDIS_HOST=$(printf '%s' "$REDIS_URL" | sed -nE 's#^[a-z]+://([^:]+:)?[^@]+@([^:/@]+).*#\2#p')
          REDIS_PORT=$(printf '%s' "$REDIS_URL" | sed -nE 's#.*@[^:]+:([0-9]+).*#\1#p')
          REDIS_PORT="${REDIS_PORT:-6379}"
          REDIS_VSOCK="${REDIS_PROXY_VSOCK_PORT:-8105}"
          printf '[Unit]\nDescription=Nautilus outbound Redis (VSOCK:%s -> %s:%s)\nAfter=network.target\n[Service]\nExecStart=/usr/bin/socat VSOCK-LISTEN:%s,fork,reuseaddr TCP:%s:%s\nRestart=always\nRestartSec=2\n[Install]\nWantedBy=multi-user.target\n' \
            "$REDIS_VSOCK" "$REDIS_HOST" "$REDIS_PORT" "$REDIS_VSOCK" "$REDIS_HOST" "$REDIS_PORT" \
            | sudo tee /etc/systemd/system/nautilus-outbound-redis.service > /dev/null

          create_outbound_service "nautilus-outbound-openai" "${OPENAI_PROXY_VSOCK_PORT:-8106}" "$OPENAI_API_BASE"

          # Embedding proxy — only when EMBEDDING_API_BASE is set and differs from OPENAI_API_BASE
          if [ -n "$EMBEDDING_API_BASE" ] && [ "$EMBEDDING_API_BASE" != "$OPENAI_API_BASE" ]; then
            create_outbound_service "nautilus-outbound-embedding" "${EMBEDDING_PROXY_VSOCK_PORT:-8108}" "$EMBEDDING_API_BASE"
            EMBEDDING_SVC="nautilus-outbound-embedding.service"
          else
            EMBEDDING_SVC=""
          fi

          # SEAL key servers (comma-separated URLs → sequential VSOCK ports from SEAL_BASE_VSOCK_PORT)
          SEAL_BASE="${SEAL_BASE_VSOCK_PORT:-8107}"
          SEAL_IDX=0
          if [ -n "$SEAL_KEY_SERVER_URLS" ]; then
            IFS=','
            for SEAL_URL in $SEAL_KEY_SERVER_URLS; do
              VSOCK_PORT=$((SEAL_BASE + SEAL_IDX))
              SEAL_HOST=$(extract_url_host "$SEAL_URL")
              SEAL_PORT=$(extract_url_port "$SEAL_URL")
              printf '[Unit]\nDescription=Nautilus outbound SEAL %s (VSOCK:%s -> %s:%s)\nAfter=network.target\n[Service]\nExecStart=/usr/bin/socat VSOCK-LISTEN:%s,fork,reuseaddr TCP:%s:%s\nRestart=always\nRestartSec=2\n[Install]\nWantedBy=multi-user.target\n' \
                "$SEAL_IDX" "$VSOCK_PORT" "$SEAL_HOST" "$SEAL_PORT" "$VSOCK_PORT" "$SEAL_HOST" "$SEAL_PORT" \
                | sudo tee "/etc/systemd/system/nautilus-outbound-seal-${SEAL_IDX}.service" > /dev/null
              SEAL_IDX=$((SEAL_IDX + 1))
            done
            unset IFS
          fi

          # Truncate log files so we only see the latest run's output
          sudo systemctl stop nautilus-logs.service nautilus-sidecar-logs.service 2>/dev/null || true
          sudo truncate -s 0 /tmp/enclave.log /tmp/sidecar.log 2>/dev/null || true

          sudo systemctl daemon-reload
          sudo systemctl enable --now \
            nautilus-bridge.service \
            nautilus-logs.service \
            nautilus-sidecar-logs.service \
            nautilus-outbound-sui.service \
            nautilus-outbound-walrus-publisher.service \
            nautilus-outbound-walrus-aggregator.service \
            nautilus-outbound-postgres.service \
            nautilus-outbound-redis.service \
            nautilus-outbound-openai.service

          [ -n "$EMBEDDING_SVC" ] && sudo systemctl enable --now "$EMBEDDING_SVC"

          # Enable SEAL services dynamically
          if [ -n "$SEAL_KEY_SERVER_URLS" ]; then
            SEAL_IDX=0
            IFS=','
            for _ in $SEAL_KEY_SERVER_URLS; do
              sudo systemctl enable --now "nautilus-outbound-seal-${SEAL_IDX}.service" || true
              SEAL_IDX=$((SEAL_IDX + 1))
            done
            unset IFS
          fi

          sleep 2
          sudo systemctl is-active nautilus-bridge.service
          sudo systemctl is-active nautilus-outbound-sui.service
          echo "Bridge active: CID=$CID  TCP:4000 -> VSOCK:4000"
          REMOTE
          rm -f /tmp/deploy_key

      # ── Send config into the enclave ──────────────────────────────────────
      # Log collectors are already running (set up in previous step) so any
      # crash in run.sh will be captured in /tmp/enclave.log on the host.
      # Strips comment lines and blank lines from ~/.env.runtime, then pipes
      # the KEY=VALUE pairs to the enclave via VSOCK port 7000.
      - name: Send config to enclave
        env:
          EC2_HOST: ${{ secrets.TEE_EC2_HOST }}
          EC2_USER: ${{ secrets.TEE_EC2_USER }}
          EC2_KEY: ${{ secrets.TEE_EC2_SSH_KEY }}
        run: |
          echo "$EC2_KEY" > /tmp/deploy_key && chmod 600 /tmp/deploy_key
          SSH="ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -i /tmp/deploy_key $EC2_USER@$EC2_HOST"
          $SSH 'bash -s' << 'REMOTE'
          set -e
          CID=$(sudo nitro-cli describe-enclaves | jq -r '.[0].EnclaveCID // empty')
          if [ -z "$CID" ]; then echo "ERROR: Enclave not running"; exit 1; fi

          for i in $(seq 1 10); do
            if grep -v '^[[:space:]]*#' ~/.env.runtime \
               | grep -v '^[[:space:]]*$' \
               | socat - VSOCK-CONNECT:$CID:7000 2>/dev/null; then
              echo "Config sent to enclave CID=$CID"
              break
            fi
            echo "Waiting for enclave to accept config... (attempt $i/10)"
            sleep 3
          done
          REMOTE
          rm -f /tmp/deploy_key

      # ── Health check ──────────────────────────────────────────────────────
      - name: Verify health
        env:
          EC2_HOST: ${{ secrets.TEE_EC2_HOST }}
          EC2_USER: ${{ secrets.TEE_EC2_USER }}
          EC2_KEY: ${{ secrets.TEE_EC2_SSH_KEY }}
        run: |
          echo "$EC2_KEY" > /tmp/deploy_key && chmod 600 /tmp/deploy_key
          SSH="ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -i /tmp/deploy_key $EC2_USER@$EC2_HOST"
          $SSH 'bash -s' << 'REMOTE'
          set -e
          # Wait for full startup: sidecar poll (15s) + DB connect + Redis connect can take ~90s
          sleep 10
          for i in $(seq 1 24); do
            if curl -sf http://localhost:4000/health > /dev/null 2>&1; then
              echo "Health check passed"
              curl -s http://localhost:4000/health
              exit 0
            fi
            echo "Waiting for health... (attempt $i/24)"
            sleep 5
          done
          echo "ERROR: Health check failed after 130s"
          echo "--- Server log ---"
          tail -50 /tmp/enclave.log 2>/dev/null || true
          echo "--- Sidecar log ---"
          tail -20 /tmp/sidecar.log 2>/dev/null || true
          exit 1
          REMOTE
          rm -f /tmp/deploy_key
